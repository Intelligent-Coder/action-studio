
sspring:
  profiles:
    active: jdbc

  datasource:
    url: jdbc:postgresql://localhost:3306/user
    username: {DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-aql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.PostgreSQLDialect

  cloud:
    config:
      server:
        jdbc:
          sql: "SELECT * FROM users"
          default-label: main

encrypt:
  key-store:
    location: config-server.jks
    password: password


